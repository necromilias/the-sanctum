# Simple workflow for deploying to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run build:pages

      # Copy CNAME into the built output
      - name: Copy CNAME to dist
        run: cp CNAME ./dist/CNAME || echo "micksfoundry.org" > ./dist/CNAME

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so deep links like /services boot the app and React Router takes over
      - name: Copy index.html to 404.html
        run: cp ./dist/index.html ./dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
